server:
  port: 8089
spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/**,/auth/**,/api/**

        - id: discovery
          uri: http://discovery:8761
          predicates:
              - Path=/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka