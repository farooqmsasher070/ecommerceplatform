apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
     # imagePullSecrets:
      #  - name: gitlab-registry-secret
      containers:
        - name: user
          image: user-service:latest
          imagePullPolicy: Never

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: default
          envFrom:
            - configMapRef:
                name: user-service-config
            - secretRef:
                name: user-db-secret
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ecommerce
spec:
  type: NodePort
  selector:
    app: user-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
