apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ecommerce
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
     # imagePullSecrets:
      #  - name: gitlab-registry-secret
      containers:
        - name: user
          image: user-service:1.0.1
          imagePullPolicy: Never

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: default
          envFrom:
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ecommerce
spec:
  type: NodePort
  selector:
    app: user-service
  ports:
    - port: 80
      targetPort: 8081
